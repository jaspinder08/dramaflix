name: dramaflix
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  supabase_flutter: ^2.8.4
  go_router: ^14.7.2
  flutter_animate: ^4.5.2
  video_player: ^2.9.2
  dio: ^5.9.2
  logger: ^2.6.2
  shared_preferences: ^2.5.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/videos/stories/the_locked_appartment/
    - assets/svg/
fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter_24pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/Inter_24pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/Inter_24pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Inter_24pt-Bold.ttf
        weight: 700